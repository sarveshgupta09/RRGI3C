<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grids</title>
    <style>
        #main{
            width: 100%;
            padding: 0px;
            margin: 0px;
        }
        
        h1{
            color: green;
            font-size: 80px;
        }
        .grid-boxes{
            padding: 2px;
            background-color: aqua;
            height: 100px;
             background-image: url(https://cdn.pixabay.com/photo/2020/04/16/11/13/background-5050213_1280.png);
        }
        @media (max-width:400px) {
           .grid-box{
            display: grid;
            grid-template-columns:repeat(1 , 1fr);
            gap: 10px;
        }
           h1{
            font-size: 20px;
            color: blue;
           }
        }
        @media (min-width:401px) {
            .grid-box{
            display: grid;
            grid-template-columns:repeat(2 , 1fr);
            gap: 10px;
        }
        }
        @media (min-width:1000px) {
            .grid-box{
            display: grid;
            grid-template-columns:repeat(3 , 1fr);
            gap: 10px;
        }
        }
        
    </style>
</head>
<body>
    <div id="main">
        <h1>Grids</h1>
<div class="grid-box">
    <div class="grid-boxes">1</div>
    <div class="grid-boxes">2</div>
    <div class="grid-boxes">3</div>
    <div class="grid-boxes">4</div>
    <div class="grid-boxes">5</div>
    <div class="grid-boxes">6</div>
    <div class="grid-boxes">7</div>
    <div class="grid-boxes">8</div>
    <div class="grid-boxes">9</div>
</div>
    </div>
</body>
</html>
