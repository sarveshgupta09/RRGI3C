<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script>
        const sum =()=>{
            const num1= Number(document.getElementById("num1").value)
            const num2= Number(document.getElementById("num2").value)

            const addition = num1+num2
            const subtract = num1-num2
            document.getElementById("add").innerHTML = "Sum is :" + addition
             document.getElementById("add").innerHTML = "diff is :" + subtract
        }
        function div(){
            const num1= Number(document.getElementById("num1").value)
            const num2= Number(document.getElementById("num2").value)

            const div = num1/num2
            document.getElementById("add").innerHTML=div
 
        }

        function mul(){
            const num1= Number(document.getElementById("num1").value)
            const num2= Number(document.getElementById("num2").value)

            document.getElementById("add").innerHTML=mul
        }

        function diff(){

            const diff = num1-num2
            document.getElementById("add").innerHTML=diff
        }
    </script>
</head>
<body>
